services:
  - type: web
    name: radiai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAX_UPLOAD_MB
        value: 50
      - key: MAX_BATCH_FILES
        value: 20
      - key: GEMINI_API_KEY
        sync: false   # Set this secret in the Render dashboard
    disk:
      name: radiai-models
      mountPath: /opt/render/project/src
      sizeGB: 10
